; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Upload settings
upload_speed = 921600
monitor_speed = 115200

; Flash memory
board_upload.flash_size = 16MB
board_build.flash_size = 16MB

; Boot and Flash mode
board_build.boot = qio
board_build.f_flash = 80000000L

; CPU Frequency (240MHz with WiFi)
board_build.f_cpu = 240000000L

; PSRAM configuration
board_build.psram = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv

; USB and Core configuration
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=1
    -DCONFIG_ARDUINO_RUNNING_CORE=1
    -DCONFIG_ARDUINO_EVENT_RUN_CORE=1
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    4-20ma/ModbusMaster @ ^2.0.0
    adafruit/Adafruit NeoPixel @ ^1.12.3
    lovyan03/LovyanGFX @ ^1.2.19
